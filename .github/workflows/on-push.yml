name: Feature Branch CI

on:
  push:
    branches-ignore:
      - main  # Run on every branch EXCEPT main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          
      - name: Install dependencies
        run: npm install
        working-directory: ./project_folder
        
      - name: Test with Built-in Runner
        run: npm test
        working-directory: ./project_folder
        env:
          NODE_ENV: test

  create-pull-request:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ success() }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Create Pull Request
        run: gh pr create -B main -H ${{ github.ref_name }} --title "Merge ${{ github.ref_name }} into main" --body "Automatic PR from Github Actions"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}