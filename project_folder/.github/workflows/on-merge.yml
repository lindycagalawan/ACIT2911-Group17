name: Production Deployment

on:
  pull_request:
    branches:
      - main
    types:
      - closed

jobs:
  deploy:
    # Only run if the PR was actually merged into main
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        run: |
          curl -X GET "${{ secrets.RENDER_DEPLOY_HOOK }}"