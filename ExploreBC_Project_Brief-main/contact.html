<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="css/style.css">


<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap" rel="stylesheet">

</head>

<body>
    <!-- Navigation -->
    <header class="navbar">
        <h1 class="logo">ExploreBC</h1>
        <nav class="nav-links">
           <ul class="lp">
                 <li><a href="index.html" class="n">Home</a></li>
                <li><a href="destinations.html" class="n">Destinations</a></li>
                <li><a href="activities.html" class="n">Activities</a></li>
                <li><a href="food.html" class="n">Food & Restaurants</a></li>
                <li><a href="contact.html" class="n">Contact</a></li>
            </ul>  
        </nav>
    </header>
<!-- Main Content -->
        <main class="contact-page">
            <section class="contact-container">
                <h1>Contact Us</h1>
                
                  
                 <div class="contact-grid">
                    <div class="contact-info">
                        <h3>Get in Touch</h3>
                        <p class="info-item">
                            <span class="icon">📍</span>
                            <span>Vancouver, BC</span>
                        </p>

                    <p class="info-item">
                        <span class="icon">📧</span>
                        <span>explorebc@email.com</span>
                    </p>

                    <p class="info-item">
                        <span class="icon">📞</span>
                        <span>+1 604 000 0000</span>
                    </p>

                    </div>

                    <!-- Contact Form -->
                     <form class="contact-form">
                     <label for="name">Name</label>
                     <input type="text" id="name" placeholder="Enter your name">

                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email">

                    <label for="message">Message</label>
                    <textarea id="message" rows="5" placeholder="Write your message"></textarea>
                
                    <button type="submit">Send Message</button>
                </form> 
            </div>    
        </section>
    </main>
    <!-- Footer -->
     <footer class="footer">
          <p>&copy; 2026 ExploreBC | Discover British Columbia</p>
     </footer>
</body>

</html>
